<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>機票資訊</title>
    <link rel="stylesheet" href="style.css">
	<link rel="stylesheet" href="travel.css">
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="ticket-content">
    <div class="flight-route">
        <div class="airport">
            <span class="code">TPE</span>
            <span class="city">台北 / 桃園</span>
            <span class="airport-name">桃園國際機場 T1</span>
        </div>

        <div class="plane-icon">
            <div class="line"></div>
            <span style="font-size: 20px;">✈️</span>
            <div class="line"></div>
        </div>

        <div class="airport">
            <span class="code">ICN</span>
            <span class="city">首爾 / 仁川</span>
            <span class="airport-name">仁川國際機場 T2</span>
        </div>
    </div>

    <div class="info-grid">
        <div class="info-item">
            <label>日期 DATE</label>
            <div class="value">2026 / 04 / 17</div>
        </div>
        <div class="info-item">
            <label>出發時間</label>
            <div class="value">01:25</div>
        </div>
        <div class="info-item">
            <label>抵達時間</label>
            <div class="value">05:00</div>
        </div>
    </div>
    <div class="return-title">—— RETURN FLIGHT ——</div>
    
    <div class="flight-route">
        <div class="airport">
            <span class="code">ICN</span>
            <span class="city">首爾 / 仁川</span>
            <span class="airport-name">仁川國際機場 T1</span>
        </div>
        <div class="plane-icon">
            <div class="line"></div>
            <span style="font-size: 20px; transform: scaleX(-1); display: inline-block;">✈️</span>
            <div class="line"></div>
        </div>
        <div class="airport">
            <span class="code">TPE</span>
            <span class="city">台北 / 桃園</span>
            <span class="airport-name">桃園國際機場 T2</span>
        </div>
    </div>

    <div class="info-grid">
        <div class="info-item">
            <label>日期 DATE</label>
            <div class="value">2026 / 04 / 21</div>
       	</div>
        <div class="info-item">
            <label>出發時間</label>
            <div class="value">19:45</div>
        </div>
        <div class="info-item">
            <label>抵達時間</label>
            <div class="value">21:25</div>
        </div>
          

    </div>
</div>

    </nav>
</body>
</html>
