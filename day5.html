	<div id="lightboxOverlay" class="lightbox-overlay" onclick="closeLightbox()">

	<script>
	function openLightbox(imgSrc) {
	    const overlay = document.getElementById('lightboxOverlay');
	    const lightboxImg = document.getElementById('lightboxImg');
	    
	    // 1. 設定大圖的來源
	    lightboxImg.src = imgSrc;
	    
	    // 2. 顯示遮罩層
	    overlay.classList.add('show');
	    
	    // 3. (選做) 防止捲動背景網頁
	    document.body.style.overflow = 'hidden';
	}
	
	function closeLightbox() {
	    const overlay = document.getElementById('lightboxOverlay');
	    
	    // 1. 隱藏遮罩層
	    overlay.classList.remove('show');
	    
	    // 2. (選做) 恢復背景網頁捲動
	    document.body.style.overflow = '';
	}
	
	// (選做) 按下 ESC 鍵也能關閉
	document.addEventListener('keydown', function(e) {
	    if (e.key === 'Escape') {
	        closeLightbox();
	    }
	});
	
	// 當網頁載入完成時，從瀏覽器記憶體讀取資料
    document.addEventListener('DOMContentLoaded', () => {
        const fields = document.querySelectorAll('.save-data');
        
        fields.forEach(field => {
            const savedValue = localStorage.getItem(field.getAttribute('data-id'));
            
            if (savedValue !== null) {
                if (field.type === 'checkbox') {
                    field.checked = savedValue === 'true';
                } else {
                    field.value = savedValue;
                }
            }

            // 當內容改變時，立刻存檔
            field.addEventListener('input', () => {
                const value = field.type === 'checkbox' ? field.checked : field.value;
                localStorage.setItem(field.getAttribute('data-id'), value);
            });
        });
    });
	
 // 當頁面載入時，自動填回上次儲存的數值
    window.onload = function() {
        const inputs = document.querySelectorAll('input[type="text"]');
        inputs.forEach(input => {
            const savedValue = localStorage.getItem(input.id);
            if (savedValue) {
                input.value = savedValue;
            }
        });
    };

    // 當輸入內容時，即時儲存到瀏覽器快取
    function saveData(el) {
        localStorage.setItem(el.id, el.value);
    }
	</script>
